<div id="sillytender_settings" class="sillytender-settings extension_container">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>SillyTender <span class="sillytender-muted">Silly酒保</span></b>
            <div class="fa-solid fa-circle-chevron-down inline-drawer-icon down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="sillytender-settings__header">
                <div>
                    <div class="sillytender-eyebrow">V0 扩展框架</div>
                    <p class="sillytender-muted">Nyaa 的 SillyTavern 扩展工具集合。当前版本只提供 UI 框架与功能占位。</p>
                </div>
                <button id="sillytender_open_drawer_from_settings" class="menu_button menu_button_icon interactable" type="button">
                    <i class="fa-solid fa-martini-glass-citrus"></i>
                    <span>打开 SillyTender</span>
                </button>
            </div>

            <div class="sillytender-setting-row">
                <label class="checkbox_label" for="sillytender_settings_enabled">
                    <input id="sillytender_settings_enabled" type="checkbox" data-sillytender-setting="enabled">
                    <span>启用扩展框架</span>
                </label>
                <small class="toggle-description">V0 不包含业务逻辑；关闭后仅隐藏主要占位内容。</small>
            </div>

            <div class="sillytender-setting-row">
                <label class="checkbox_label" for="sillytender_settings_debug">
                    <input id="sillytender_settings_debug" type="checkbox" data-sillytender-setting="debugMode">
                    <span>调试模式</span>
                </label>
                <small class="toggle-description">用于后续阶段输出更多诊断信息。</small>
            </div>

            <div class="sillytender-setting-row">
                <label for="sillytender_settings_density">UI 密度</label>
                <select id="sillytender_settings_density" data-sillytender-setting="uiDensity">
                    <option value="comfortable">舒适</option>
                    <option value="compact">紧凑</option>
                </select>
            </div>

            <div class="sillytender-links">
                <a href="https://github.com/NyaaCaster/st-SillyTender" target="_blank" rel="noopener noreferrer">GitHub 仓库</a>
                <span data-sillytender-update-status>更新检查等待初始化。</span>
            </div>
        </div>
    </div>
</div>
